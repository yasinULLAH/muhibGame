<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Flappy Muhib 🐦</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Trebuchet MS', sans-serif;
    background: linear-gradient(#4ec0ca, #87ceeb);
    touch-action: none;
    user-select: none;
  }
  #gameWrap {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    background: linear-gradient(#4ec0ca 0%, #87ceeb 70%, #ded895 70%, #ded895 100%);
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    max-width: 100%; max-height: 100%;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: white; text-align: center;
    padding: 20px;
    pointer-events: none;
  }
  .overlay.active { pointer-events: auto; }
  .hidden { display: none !important; }
  h1 {
    font-size: clamp(2rem, 8vw, 4rem);
    color: #fff;
    text-shadow: 3px 3px 0 #e67e22, 6px 6px 0 rgba(0,0,0,0.2);
    margin-bottom: 10px;
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .dedication {
    background: rgba(0,0,0,0.35);
    padding: 12px 20px;
    border-radius: 15px;
    margin: 15px 0;
    font-size: clamp(0.9rem, 3vw, 1.2rem);
    max-width: 90%;
    backdrop-filter: blur(4px);
  }
  .dedication strong { color: #ffd93d; font-size: 1.2em; }
  .btn {
    background: linear-gradient(#ffd93d, #f39c12);
    color: #2c3e50;
    border: none;
    padding: 14px 32px;
    font-size: clamp(1rem, 4vw, 1.3rem);
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 0 #c87f00, 0 8px 20px rgba(0,0,0,0.3);
    margin-top: 15px;
    transition: transform 0.1s;
    pointer-events: auto;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c87f00; }
  .score-display {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(2.5rem, 8vw, 4rem);
    color: white;
    font-weight: bold;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    z-index: 5;
    pointer-events: none;
  }
  .game-over-box {
    background: rgba(0,0,0,0.6);
    padding: 25px 35px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
  }
  .game-over-box h2 { font-size: clamp(1.8rem, 6vw, 2.5rem); margin-bottom: 10px; }
  .game-over-box p { font-size: clamp(1rem, 3.5vw, 1.3rem); margin: 6px 0; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn.secondary {
    background: linear-gradient(#95a5a6, #7f8c8d);
    color: white;
    box-shadow: 0 6px 0 #5d6d6e, 0 8px 20px rgba(0,0,0,0.3);
  }
  .hint {
    margin-top: 15px;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    opacity: 0.9;
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game"></canvas>

  <div id="scoreDisplay" class="score-display hidden">0</div>

  <!-- Start Screen -->
  <div id="startScreen" class="overlay active">
    <h1>🐦 Flappy Muhib</h1>
    <div class="dedication">
      Dedicated with love to my little brother<br>
      <strong>Muhib Ullah ❤️</strong><br>
      <small>Keep flying high, little bro!</small>
    </div>
    <button class="btn" id="startBtn">▶ Play</button>
    <p class="hint">Tap / Click / Space to flap</p>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="game-over-box">
      <h2>💥 Game Over!</h2>
      <p>Score: <span id="finalScore">0</span></p>
      <p>Best: <span id="bestScore">0</span></p>
      <div class="btn-row">
        <button class="btn" id="restartBtn">🔁 Play Again</button>
        <button class="btn secondary" id="resetBtn">🗑 Reset Best</button>
      </div>
      <p class="hint">Keep going, Muhib! 💪</p>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScore');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Logical game size (scales responsively)
  const W = 400, H = 600;
  canvas.width = W; canvas.height = H;

  function resizeCanvas() {
    const wrap = document.getElementById('gameWrap');
    const ratio = W / H;
    let cw = wrap.clientWidth, ch = wrap.clientHeight;
    if (cw / ch > ratio) cw = ch * ratio; else ch = cw / ratio;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // --- Audio (Web Audio API) ---
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type='sine', vol=0.15, slideTo=null) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
  }
  const sfx = {
    jump:  () => beep(600, 0.12, 'square', 0.12, 900),
    score: () => { beep(880, 0.08, 'triangle', 0.15); setTimeout(()=>beep(1320, 0.1, 'triangle', 0.15), 80); },
    hit:   () => beep(200, 0.25, 'sawtooth', 0.2, 60),
    win:   () => { beep(523,0.1,'triangle',0.15); setTimeout(()=>beep(659,0.1,'triangle',0.15),100); setTimeout(()=>beep(784,0.15,'triangle',0.15),200); }
  };

  // --- Game state ---
  const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = STATE.MENU;
  let score = 0;
  let best = parseInt(localStorage.getItem('flappyMuhibBest') || '0', 10);

  // Bird
  const bird = {
    x: W * 0.28, y: H / 2,
    r: 16,
    vy: 0,
    rot: 0,
    flapPower: -7.5,
    gravity: 0.4,
    maxFall: 10
  };

  // Pipes
  const pipes = [];
  const PIPE_W = 60;
  const GAP = 150;
  const PIPE_SPEED = 2.4;
  let pipeTimer = 0;
  const PIPE_INTERVAL = 90; // frames

  // Clouds (decorative)
  const clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({ x: Math.random()*W, y: Math.random()*H*0.5, s: 0.5 + Math.random()*0.8 });
  }

  // Ground scroll
  let groundX = 0;

  function resetGame() {
    bird.y = H / 2; bird.vy = 0; bird.rot = 0;
    pipes.length = 0;
    pipeTimer = 0;
    score = 0;
    scoreDisplay.textContent = '0';
  }

  function spawnPipe() {
    const minTop = 60;
    const maxTop = H - GAP - 120; // leave room for ground
    const top = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: W + 10, top: top, passed: false });
  }

  function flap() {
    if (state === STATE.PLAY) {
      bird.vy = bird.flapPower;
      sfx.jump();
    }
  }

  function startGame() {
    ensureAudio();
    resetGame();
    state = STATE.PLAY;
    startScreen.classList.add('hidden');
    startScreen.classList.remove('active');
    gameOverScreen.classList.add('hidden');
    gameOverScreen.classList.remove('active');
    scoreDisplay.classList.remove('hidden');
  }

  function gameOver() {
    state = STATE.OVER;
    sfx.hit();
    if (score > best) {
      best = score;
      localStorage.setItem('flappyMuhibBest', String(best));
      sfx.win();
    }
    finalScoreEl.textContent = score;
    bestScoreEl.textContent = best;
    scoreDisplay.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
    gameOverScreen.classList.add('active');
  }

  function resetBest() {
    best = 0;
    localStorage.removeItem('flappyMuhibBest');
    bestScoreEl.textContent = '0';
  }

  // --- Input ---
  function handleInput(e) {
    if (e) e.preventDefault();
    ensureAudio();
    if (state === STATE.MENU) startGame();
    else if (state === STATE.PLAY) flap();
  }
  canvas.addEventListener('mousedown', handleInput);
  canvas.addEventListener('touchstart', handleInput, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      handleInput();
    }
  });

  startBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
  restartBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
  resetBtn.addEventListener('click', (e) => { e.stopPropagation(); resetBest(); });

  // --- Collision ---
  function collide() {
    // Ground / ceiling
    if (bird.y + bird.r >= H - 60) return true;
    if (bird.y - bird.r <= 0) return true;
    // Pipes
    for (const p of pipes) {
      if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W) {
        if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + GAP) {
          return true;
        }
      }
    }
    return false;
  }

  // --- Draw ---
  function drawClouds() {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (const c of clouds) {
      ctx.beginPath();
      ctx.arc(c.x, c.y, 18*c.s, 0, Math.PI*2);
      ctx.arc(c.x+18*c.s, c.y+4*c.s, 14*c.s, 0, Math.PI*2);
      ctx.arc(c.x-18*c.s, c.y+4*c.s, 14*c.s, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);
    // body
    ctx.fillStyle = '#ffd93d';
    ctx.beginPath(); ctx.arc(0,0,bird.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#c87f00'; ctx.lineWidth = 2; ctx.stroke();
    // wing
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.ellipse(-3, 3, 9, 5, -0.3, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    // eye
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(6, -5, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'black';
    ctx.beginPath(); ctx.arc(8, -5, 2.5, 0, Math.PI*2); ctx.fill();
    // beak
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.moveTo(12, -2); ctx.lineTo(22, 0); ctx.lineTo(12, 4); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawPipe(p) {
    const bottomY = p.top + GAP;
    const groundY = H - 60;
    // gradient
    const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    grad.addColorStop(0, '#5fa847');
    grad.addColorStop(0.5, '#7fd163');
    grad.addColorStop(1, '#3e7a2a');
    ctx.fillStyle = grad;
    // top pipe
    ctx.fillRect(p.x, 0, PIPE_W, p.top);
    ctx.fillRect(p.x - 4, p.top - 20, PIPE_W + 8, 20);
    // bottom pipe
    ctx.fillRect(p.x, bottomY, PIPE_W, groundY - bottomY);
    ctx.fillRect(p.x - 4, bottomY, PIPE_W + 8, 20);
    // outline
    ctx.strokeStyle = '#2c5a1a'; ctx.lineWidth = 2;
    ctx.strokeRect(p.x, 0, PIPE_W, p.top);
    ctx.strokeRect(p.x - 4, p.top - 20, PIPE_W + 8, 20);
    ctx.strokeRect(p.x, bottomY, PIPE_W, groundY - bottomY);
    ctx.strokeRect(p.x - 4, bottomY, PIPE_W + 8, 20);
  }

  function drawGround() {
    const groundY = H - 60;
    // dirt
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, groundY, W, 60);
    // grass top
    ctx.fillStyle = '#7fd163';
    ctx.fillRect(0, groundY, W, 12);
    // stripes
    ctx.fillStyle = '#c8b878';
    for (let x = -groundX; x < W; x += 24) {
      ctx.fillRect(x, groundY + 20, 12, 6);
      ctx.fillRect(x + 12, groundY + 40, 12, 6);
    }
  }

  function draw() {
    // sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#4ec0ca');
    sky.addColorStop(0.7, '#87ceeb');
    sky.addColorStop(0.7, '#ded895');
    sky.addColorStop(1, '#ded895');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    drawClouds();
    for (const p of pipes) drawPipe(p);
    drawGround();
    drawBird();
  }

  // --- Update ---
  function update() {
    // clouds drift
    for (const c of clouds) {
      c.x -= 0.3 * c.s;
      if (c.x < -40) { c.x = W + 40; c.y = Math.random() * H * 0.5; }
    }

    if (state !== STATE.PLAY) {
      // idle bobbing on menu
      if (state === STATE.MENU) {
        bird.y = H/2 + Math.sin(Date.now()/300) * 10;
        bird.rot = 0;
      }
      return;
    }

    // physics
    bird.vy += bird.gravity;
    if (bird.vy > bird.maxFall) bird.vy = bird.maxFall;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy * 0.08));

    // pipes
    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) {
      pipeTimer = 0;
      spawnPipe();
    }
    for (const p of pipes) {
      p.x -= PIPE_SPEED;
      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true;
        score++;
        scoreDisplay.textContent = score;
        sfx.score();
      }
    }
    while (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();

    // ground scroll
    groundX = (groundX + PIPE_SPEED) % 24;

    // collision
    if (collide()) gameOver();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  bestScoreEl.textContent = best;
  loop();
})();
</script>
</body>
</html>
